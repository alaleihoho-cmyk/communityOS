<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>社区AI运营平台 · CommunityOS</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg-base: #080c17;
  --bg-panel: #0e1320;
  --bg-card: #141b2b;
  --bg-hover: #1a2338;
  --border: #1e2a3f;
  --text-primary: #e4e8f1;
  --text-secondary: #8893a8;
  --text-muted: #5a6680;
  --accent-blue: #4d90fe;
  --accent-purple: #8b5cf6;
  --accent-gold: #f0b429;
  --accent-green: #34d399;
  --accent-red: #f87171;
  --accent-orange: #fb923c;
}

body {
  background: var(--bg-base);
  color: var(--text-primary);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* === 顶部栏 === */
.topbar {
  height: 52px;
  background: var(--bg-panel);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 16px;
  flex-shrink: 0;
  z-index: 10;
}
.logo {
  font-size: 15px;
  font-weight: 800;
  color: #fff;
  letter-spacing: 1px;
  white-space: nowrap;
}
.logo span { color: var(--accent-purple); }

/* 产品选择器 */
.product-selector {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 14px;
  cursor: pointer;
  transition: border-color 0.2s;
  position: relative;
}
.product-selector:hover { border-color: var(--accent-blue); }
.product-selector .prod-icon {
  width: 22px; height: 22px;
  border-radius: 5px;
  background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; color: #fff; font-weight: 700;
}
.product-selector .prod-name { font-size: 13px; font-weight: 600; color: #fff; }
.product-selector .prod-arrow { font-size: 10px; color: var(--text-muted); }
.product-selector .prod-lock {
  font-size: 10px;
  color: var(--accent-gold);
  margin-left: 4px;
}

/* 角色切换 */
.role-switch {
  margin-left: 8px;
  display: flex;
  gap: 4px;
  background: var(--bg-card);
  border-radius: 8px;
  padding: 3px;
  border: 1px solid var(--border);
}
.role-btn {
  font-size: 11px;
  padding: 4px 12px;
  border-radius: 6px;
  cursor: pointer;
  border: none;
  background: transparent;
  color: var(--text-muted);
  font-weight: 500;
  transition: all 0.15s;
}
.role-btn.active {
  background: var(--accent-blue);
  color: #fff;
}
.role-btn:hover:not(.active) { color: var(--text-secondary); }

.topbar-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 14px;
}
.topbar-right .time {
  font-size: 11px;
  color: var(--text-muted);
}
.avatar {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: #fff;
}

/* === 主布局 === */
.main-layout {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* === 侧边栏 === */
.sidebar {
  width: 200px;
  background: var(--bg-panel);
  border-right: 1px solid var(--border);
  padding: 12px 0;
  overflow-y: auto;
  flex-shrink: 0;
}
.sidebar-section {
  margin-bottom: 16px;
}
.sidebar-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-muted);
  padding: 0 16px;
  margin-bottom: 6px;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 16px;
  cursor: pointer;
  font-size: 13px;
  color: var(--text-secondary);
  transition: all 0.15s;
  border-left: 3px solid transparent;
  position: relative;
}
.nav-item:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
}
.nav-item.active {
  background: linear-gradient(90deg, rgba(77,144,254,0.12) 0%, transparent 100%);
  color: #fff;
  border-left-color: var(--accent-blue);
}
.nav-item .nav-icon { font-size: 15px; width: 20px; text-align: center; }
.nav-item .badge {
  margin-left: auto;
  font-size: 10px;
  background: var(--accent-red);
  color: #fff;
  border-radius: 10px;
  padding: 1px 7px;
  font-weight: 600;
}
.nav-item .badge.green { background: var(--accent-green); }

/* === 内容区 === */
.content {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* 模块标题栏 */
.module-header {
  padding: 16px 24px 0;
  display: flex;
  align-items: center;
  gap: 10px;
}
.module-header h2 {
  font-size: 18px;
  font-weight: 700;
  color: #fff;
}
.module-header .subtitle {
  font-size: 12px;
  color: var(--text-muted);
}

/* 三栏面板 */
.panels {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 16px;
  padding: 16px 24px;
  overflow-y: auto;
}
.panel {
  background: var(--bg-panel);
  border-radius: 12px;
  border: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.panel-header {
  padding: 14px 16px 10px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
}
.panel-header .panel-icon { font-size: 14px; }
.panel-header .panel-title { font-size: 13px; font-weight: 700; color: #fff; }
.panel-header .panel-badge {
  margin-left: auto;
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 10px;
  font-weight: 600;
}
.badge-data { background: rgba(77,144,254,0.15); color: var(--accent-blue); }
.badge-insight { background: rgba(139,92,246,0.15); color: var(--accent-purple); }
.badge-action { background: rgba(240,180,41,0.15); color: var(--accent-gold); }

.panel-body {
  flex: 1;
  padding: 12px 16px;
  overflow-y: auto;
  font-size: 12px;
  color: var(--text-secondary);
  line-height: 1.7;
}

/* 数据层卡片 */
.data-row {
  display: flex;
  gap: 8px;
  margin-bottom: 10px;
}
.data-metric {
  flex: 1;
  background: var(--bg-card);
  border-radius: 8px;
  padding: 10px;
  text-align: center;
}
.data-metric .val {
  font-size: 20px;
  font-weight: 800;
  color: #fff;
  line-height: 1;
}
.data-metric .val.gold { color: var(--accent-gold); }
.data-metric .val.red { color: var(--accent-red); }
.data-metric .val.green { color: var(--accent-green); }
.data-metric .lbl {
  font-size: 10px;
  color: var(--text-muted);
  margin-top: 4px;
}

/* 趋势小条 */
.trend-bar {
  height: 4px;
  background: var(--bg-card);
  border-radius: 2px;
  margin-top: 4px;
  overflow: hidden;
}
.trend-bar .fill {
  height: 100%;
  border-radius: 2px;
}
.fill.up { background: var(--accent-green); }
.fill.down { background: var(--accent-red); }
.fill.warn { background: var(--accent-orange); }

/* 服务器列表 */
.server-list {
  list-style: none;
}
.server-list li {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
}
.server-list li:last-child { border-bottom: none; }
.server-list .srv-name { font-size: 12px; font-weight: 600; color: var(--text-primary); }
.server-list .srv-stat { margin-left: auto; font-size: 11px; }
.srv-stat.up { color: var(--accent-green); }
.srv-stat.down { color: var(--accent-red); }

/* 洞察卡片 */
.insight-card {
  background: var(--bg-card);
  border-radius: 8px;
  padding: 12px;
  margin-bottom: 10px;
  border-left: 3px solid var(--accent-purple);
}
.insight-card.warn { border-left-color: var(--accent-orange); }
.insight-card.good { border-left-color: var(--accent-green); }
.insight-card .insight-title {
  font-size: 12px;
  font-weight: 700;
  color: #fff;
  margin-bottom: 4px;
}
.insight-card .insight-desc {
  font-size: 11px;
  color: var(--text-secondary);
}

/* 动作区 */
.action-item {
  background: var(--bg-card);
  border-radius: 8px;
  padding: 12px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: background 0.15s;
  border: 1px solid transparent;
}
.action-item:hover { background: var(--bg-hover); border-color: var(--accent-gold); }
.action-item .act-title { font-size: 12px; font-weight: 600; color: #fff; }
.action-item .act-desc { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.action-item .act-btn {
  margin-top: 8px;
  display: inline-block;
  font-size: 11px;
  font-weight: 600;
  padding: 5px 14px;
  border-radius: 6px;
  background: var(--accent-gold);
  color: #1a1a1a;
  cursor: pointer;
  border: none;
}
.action-item .act-btn.small {
  background: transparent;
  border: 1px solid var(--accent-blue);
  color: var(--accent-blue);
}

/* === 底部状态栏 === */
.statusbar {
  height: 32px;
  background: var(--bg-panel);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  font-size: 10px;
  color: var(--text-muted);
  gap: 20px;
  flex-shrink: 0;
}
.status-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-right: 6px; }
.status-dot.green { background: var(--accent-green); }

/* === 筛选栏 === */
.filter-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 24px;
  background: var(--bg-panel);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.filter-group {
  display: flex;
  align-items: center;
  gap: 6px;
}
.filter-label {
  font-size: 11px;
  color: var(--text-muted);
  white-space: nowrap;
}
.filter-dropdown {
  position: relative;
}
.filter-trigger {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 5px 10px;
  font-size: 11px;
  color: var(--text-primary);
  cursor: pointer;
  transition: border-color 0.15s;
  white-space: nowrap;
}
.filter-trigger:hover { border-color: var(--accent-blue); }
.filter-trigger .arrow { font-size: 8px; color: var(--text-muted); }
.filter-menu {
  display: none;
  position: absolute;
  top: 100%;
  left: 0;
  margin-top: 4px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 4px;
  z-index: 100;
  min-width: 160px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.5);
}
.filter-menu.show { display: block; }
.filter-option {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 10px;
  font-size: 11px;
  color: var(--text-secondary);
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.1s;
  white-space: nowrap;
}
.filter-option:hover { background: var(--bg-hover); color: var(--text-primary); }
.filter-option.selected { background: rgba(77,144,254,0.15); color: var(--accent-blue); font-weight: 600; }
.filter-option .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}
.filter-option .dot.all { background: var(--accent-blue); }
.filter-option .dot.dc { background: #5865F2; }
.filter-option .dot.rdt { background: #ff4500; }
.filter-option .dot.steam { background: var(--accent-green); }
.filter-option .dot.twitter { background: var(--accent-blue); }
.filter-badge {
  font-size: 9px;
  padding: 1px 6px;
  border-radius: 8px;
  font-weight: 600;
  margin-left: auto;
}
.filter-badge.active-badge { background: rgba(52,211,153,0.15); color: var(--accent-green); }
.filter-divider {
  height: 1px;
  background: var(--border);
  margin: 4px 6px;
}

/* 响应式 */
@media (max-width: 1100px) {
  .panels { grid-template-columns: 1fr; }
  .filter-bar { flex-wrap: wrap; }
}
</style>
</head>

// ============ 渲染函数 ============
function renderFilterBar(modKey) {
  const m = modules[modKey];
  if (!m.filterable) return '';
  const scopeOpts = m.scopeOptions.map((o, i) =>
    `<div class="filter-option${i===0?' selected':''}" data-val="${o.id}" data-group="scope">
      <span class="dot ${o.dot}"></span>${o.label}
      ${i===0?'<span class="filter-badge active-badge">当前</span>':''}
    </div>`
  ).join('');
  const timeOpts = m.timeOptions.map((o, i) =>
    `<div class="filter-option${i===0?' selected':''}" data-val="${o.id}" data-group="time">${o.label}</div>`
  ).join('');
  return `
  <div class="filter-bar" id="filterBar">
    <div class="filter-group">
      <span class="filter-label">数据范围</span>
      <div class="filter-dropdown" id="scopeDropdown">
        <div class="filter-trigger" id="scopeTrigger">
          <span class="dot ${m.scopeOptions[0].dot}"></span>
          <span id="scopeText">${m.scopeOptions[0].label}</span>
          <span class="arrow">▾</span>
        </div>
        <div class="filter-menu" id="scopeMenu">${scopeOpts}</div>
      </div>
    </div>
    <div class="filter-group">
      <span class="filter-label">时间范围</span>
      <div class="filter-dropdown" id="timeDropdown">
        <div class="filter-trigger" id="timeTrigger">
          <span id="timeText">${m.timeOptions[0].label}</span>
          <span class="arrow">▾</span>
        </div>
        <div class="filter-menu" id="timeMenu">${timeOpts}</div>
      </div>
    </div>
  </div>`;
}

function renderModule(modKey) {
  const m = modules[modKey];
  const filterHTML = renderFilterBar(modKey);
  const dataCards = m.data.map(d => `
    <div class="data-metric">
      <div class="val ${d.color === 'gold' ? 'gold' : d.color === 'red' ? 'red' : d.color === 'green' ? 'green' : ''}">${d.val}</div>
      <div class="lbl">${d.label}</div>
      <div class="lbl" style="color:${d.color==='red'?'var(--accent-red)':'var(--accent-green)'}">${d.change}</div>
      <div class="trend-bar"><div class="fill ${d.dir}" style="width:${d.trend}%"></div></div>
    </div>
  `).join('');

  const servers = m.servers ? `
    <div style="font-size:11px;font-weight:700;color:var(--text-primary);margin-bottom:6px;">实时监控</div>
    <ul class="server-list">
      ${m.servers.map(s => {
        if (s.members) return `<li><span class="srv-name">${s.name}</span><span class="srv-stat ${s.dir}">${s.members} &nbsp;${s.chg||''}</span></li>`;
        if (s.count) return `<li><span class="srv-name">${s.name}</span><span style="font-size:10px;color:var(--text-muted)">${s.count} · ${s.sentiment}</span></li>`;
        if (s.platform) return `<li><span class="srv-name">${s.name}</span><span style="font-size:10px;color:var(--text-muted)">${s.platform} · ${s.reach} · ${s.category}</span></li>`;
        if (s.followers) return `<li><span class="srv-name">${s.name}</span><span style="font-size:10px;color:var(--text-muted)">${s.followers} Followers · ${s.engagement}互动</span></li>`;
        return `<li><span class="srv-name">${s.name}</span><span style="font-size:10px;color:var(--text-muted)">${s.status||''} · ${s.effect||''} · ${s.time||''}</span></li>`;
      }).join('')}
    </ul>
  ` : '';

  const insights = m.insights.map(i => `
    <div class="insight-card ${i.type}">
      <div class="insight-title">${i.title}</div>
      <div class="insight-desc">${i.desc}</div>
    </div>
  `).join('');

  const actions = m.actions.map(a => `
    <div class="action-item">
      <div class="act-title">${a.title}</div>
      <div class="act-desc">${a.desc}</div>
      <span class="act-btn">${a.btn}</span>
    </div>
  `).join('');

  return `
    <div class="module-header">
      <h2>${m.title}</h2>
      <span class="subtitle">${m.subtitle}</span>
    </div>
    ${filterHTML}
    <div class="panels">
      <div class="panel">
        <div class="panel-header">
          <span class="panel-icon">📋</span>
          <span class="panel-title">数据层</span>
          <span class="panel-badge badge-data">实时</span>
        </div>
        <div class="panel-body">
          <div class="data-row">${dataCards}</div>
          ${servers}
        </div>
      </div>
      <div class="panel">
        <div class="panel-header">
          <span class="panel-icon">💡</span>
          <span class="panel-title">洞察层</span>
          <span class="panel-badge badge-insight">AI 分析</span>
        </div>
        <div class="panel-body">${insights}</div>
      </div>
      <div class="panel">
        <div class="panel-header">
          <span class="panel-icon">⚡</span>
          <span class="panel-title">动作层</span>
          <span class="panel-badge badge-action">可执行</span>
        </div>
        <div class="panel-body">${actions}</div>
      </div>
    </div>
  `;
}

// ============ 下拉菜单交互 ============
function bindFilterDropdowns() {
  const scopeDropdown = document.getElementById('scopeDropdown');
  const timeDropdown = document.getElementById('timeDropdown');
  if (!scopeDropdown && !timeDropdown) return;

  function setupDropdown(ddId, triggerId, menuId) {
    const dd = document.getElementById(ddId);
    const trigger = document.getElementById(triggerId);
    const menu = document.getElementById(menuId);
    if (!dd || !trigger || !menu) return;
    trigger.addEventListener('click', (e) => {
      e.stopPropagation();
      const isOpen = menu.classList.contains('show');
      document.querySelectorAll('.filter-menu').forEach(m => m.classList.remove('show'));
      if (!isOpen) menu.classList.add('show');
    });
  }
  setupDropdown('scopeDropdown', 'scopeTrigger', 'scopeMenu');
  setupDropdown('timeDropdown', 'timeTrigger', 'timeMenu');

  // 选项点击
  document.querySelectorAll('.filter-option').forEach(opt => {
    opt.addEventListener('click', function() {
      const group = this.dataset.group;
      const val = this.dataset.val;
      const label = this.textContent.replace('当前', '').trim();
      // 更新同组选中态
      this.parentElement.querySelectorAll('.filter-option').forEach(o => o.classList.remove('selected'));
      this.classList.add('selected');
      // 更新触发按钮文字
      if (group === 'scope') {
        const dotEl = this.querySelector('.dot')?.cloneNode(true) || '';
        document.getElementById('scopeText').textContent = label;
      } else {
        document.getElementById('timeText').textContent = label;
      }
      // 关闭菜单
      this.parentElement.classList.remove('show');
    });
  });
}

// 点击外部关闭
document.addEventListener('click', () => {
  document.querySelectorAll('.filter-menu').forEach(m => m.classList.remove('show'));
});

// ============ 初始化 ============
const contentEl = document.getElementById('mainContent');
let currentModule = 'hotspot';
contentEl.innerHTML = renderModule(currentModule);
bindFilterDropdowns();

// 导航切换
document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', function() {
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    this.classList.add('active');
    currentModule = this.dataset.module;
    contentEl.innerHTML = renderModule(currentModule);
    bindFilterDropdowns();
  });
});

// 角色切换
document.querySelectorAll('.role-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
  });
});
