<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DC 工作台 · CommunityOS</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg-base: #080c17;
  --bg-panel: #0e1320;
  --bg-card: #141b2b;
  --bg-hover: #1a2338;
  --border: #1e2a3f;
  --text-primary: #e4e8f1;
  --text-secondary: #8893a8;
  --text-muted: #5a6680;
  --accent-blue: #4d90fe;
  --accent-purple: #8b5cf6;
  --accent-gold: #f0b429;
  --accent-green: #34d399;
  --accent-red: #f87171;
  --accent-orange: #fb923c;
  --dc-brand: #5865F2;
}
body {
  background: var(--bg-base);
  color: var(--text-primary);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  height: 100vh; display: flex; flex-direction: column; overflow: hidden;
}

/* Topbar */
.topbar {
  height: 52px; background: var(--bg-panel); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 20px; gap: 16px; flex-shrink: 0; z-index: 10;
}
.logo { font-size: 15px; font-weight: 800; color: #fff; letter-spacing: 1px; }
.logo span { color: var(--dc-brand); }
.breadcrumb { font-size: 12px; color: var(--text-muted); }
.breadcrumb a { color: var(--accent-blue); text-decoration: none; }
.breadcrumb a:hover { text-decoration: underline; }

.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 14px; }
.topbar-right .time { font-size: 11px; color: var(--text-muted); }
.avatar {
  width: 28px; height: 28px; border-radius: 50%;
  background: linear-gradient(135deg, var(--dc-brand), var(--accent-purple));
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: #fff;
}
.badge-live {
  font-size: 10px; padding: 3px 10px; border-radius: 10px; font-weight: 600;
  background: rgba(52,211,153,0.12); color: var(--accent-green);
}

/* Layout */
.main-layout { display: flex; flex: 1; overflow: hidden; }

/* Sidebar */
.sidebar {
  width: 200px; background: var(--bg-panel); border-right: 1px solid var(--border);
  padding: 12px 0; overflow-y: auto; flex-shrink: 0;
}
.sidebar-label {
  font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px;
  color: var(--text-muted); padding: 0 16px; margin-bottom: 6px;
}
.nav-item {
  display: flex; align-items: center; gap: 10px; padding: 10px 16px;
  cursor: pointer; font-size: 13px; color: var(--text-secondary);
  transition: all 0.15s; border-left: 3px solid transparent;
}
.nav-item:hover { background: var(--bg-hover); color: var(--text-primary); }
.nav-item.active {
  background: linear-gradient(90deg, rgba(88,101,242,0.15) 0%, transparent 100%);
  color: #fff; border-left-color: var(--dc-brand);
}
.nav-item .nav-icon { font-size: 15px; width: 20px; text-align: center; }
.nav-item .badge {
  margin-left: auto; font-size: 10px; background: var(--accent-red);
  color: #fff; border-radius: 10px; padding: 1px 7px; font-weight: 600;
}
.nav-item .badge.green { background: var(--accent-green); }

/* Content */
.content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* Module header */
.module-header { padding: 20px 24px 0; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
.module-header h2 { font-size: 20px; font-weight: 700; color: #fff; }
.module-header .subtitle { font-size: 12px; color: var(--text-muted); }

/* Panels */
.panels { flex: 1; display: grid; grid-template-columns: 2fr 1fr; gap: 16px; padding: 16px 24px; overflow-y: auto; }
.panels-single { flex: 1; display: flex; flex-direction: column; gap: 16px; padding: 16px 24px; overflow-y: auto; }

.panel {
  background: var(--bg-panel); border-radius: 12px; border: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
}
.panel.full-width { grid-column: 1 / -1; }
.panel-header {
  padding: 14px 16px 10px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
}
.panel-title { font-size: 13px; font-weight: 700; color: #fff; }
.panel-badge {
  margin-left: auto; font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 600;
}
.bd-data { background: rgba(77,144,254,0.15); color: var(--accent-blue); }
.bd-insight { background: rgba(139,92,246,0.15); color: var(--accent-purple); }
.bd-action { background: rgba(240,180,41,0.15); color: var(--accent-gold); }
.bd-live { background: rgba(52,211,153,0.15); color: var(--accent-green); }

.panel-body { flex: 1; padding: 14px 16px; overflow-y: auto; font-size: 12px; color: var(--text-secondary); line-height: 1.7; }

/* Metric cards */
.metrics-row { display: flex; gap: 10px; margin-bottom: 14px; }
.metric-card {
  flex: 1; background: var(--bg-card); border-radius: 10px; padding: 14px;
  border: 1px solid var(--border);
}
.metric-card .val { font-size: 24px; font-weight: 800; color: #fff; }
.metric-card .val.gold { color: var(--accent-gold); }
.metric-card .val.red { color: var(--accent-red); }
.metric-card .val.green { color: var(--accent-green); }
.metric-card .lbl { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
.metric-card .chg { font-size: 10px; margin-top: 2px; }
.metric-card .chg.up { color: var(--accent-green); }
.metric-card .chg.down { color: var(--accent-red); }

/* Table */
.data-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.data-table th {
  text-align: left; padding: 8px 12px; color: var(--text-muted);
  font-weight: 600; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px;
  border-bottom: 1px solid var(--border);
}
.data-table td {
  padding: 10px 12px; border-bottom: 1px solid var(--border); color: var(--text-secondary);
}
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: var(--bg-hover); }
.data-table .td-name { color: var(--text-primary); font-weight: 600; }
.data-table .td-status { font-size: 11px; }
.td-status.live { color: var(--accent-green); }
.td-status.done { color: var(--text-muted); }
.td-status.warn { color: var(--accent-orange); }

/* Status dots */
.status-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-right: 6px; }
.status-dot.green { background: var(--accent-green); }
.status-dot.orange { background: var(--accent-orange); }
.status-dot.red { background: var(--accent-red); }

/* Tags */
.tag {
  display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: 600;
  margin-right: 4px;
}
.tag.blue { background: rgba(77,144,254,0.15); color: var(--accent-blue); }
.tag.purple { background: rgba(139,92,246,0.15); color: var(--accent-purple); }
.tag.gold { background: rgba(240,180,41,0.15); color: var(--accent-gold); }
.tag.green { background: rgba(52,211,153,0.15); color: var(--accent-green); }

/* Buttons */
.btn {
  display: inline-block; font-size: 11px; font-weight: 600; padding: 6px 14px;
  border-radius: 6px; cursor: pointer; border: none; transition: all 0.15s;
}
.btn-primary { background: var(--dc-brand); color: #fff; }
.btn-primary:hover { opacity: 0.9; }
.btn-outline { background: transparent; border: 1px solid var(--dc-brand); color: var(--dc-brand); }
.btn-outline:hover { background: rgba(88,101,242,0.1); }
.btn-gold { background: var(--accent-gold); color: #1a1a1a; }
.btn-red { background: rgba(248,113,113,0.15); color: var(--accent-red); border: 1px solid rgba(248,113,113,0.3); }
.btn-sm { padding: 4px 10px; font-size: 10px; }

/* Insight cards */
.insight-card {
  background: var(--bg-card); border-radius: 8px; padding: 12px; margin-bottom: 10px;
  border-left: 3px solid var(--accent-purple);
}
.insight-card.warn { border-left-color: var(--accent-orange); }
.insight-card.good { border-left-color: var(--accent-green); }
.insight-card .insight-title { font-size: 12px; font-weight: 700; color: #fff; margin-bottom: 4px; }
.insight-card .insight-desc { font-size: 11px; color: var(--text-secondary); }

/* Template cards */
.template-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.template-card {
  background: var(--bg-card); border-radius: 10px; padding: 14px; border: 1px solid var(--border);
  cursor: pointer; transition: all 0.15s;
}
.template-card:hover { border-color: var(--dc-brand); background: var(--bg-hover); }
.template-card .tpl-name { font-size: 13px; font-weight: 700; color: #fff; margin-bottom: 4px; }
.template-card .tpl-desc { font-size: 11px; color: var(--text-muted); }
.template-card .tpl-meta { margin-top: 8px; display: flex; gap: 8px; }

/* Section divider */
.section-title {
  font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase;
  letter-spacing: 1px; margin: 16px 0 8px;
}

/* Footer bar */
.statusbar {
  height: 32px; background: var(--bg-panel); border-top: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 20px; font-size: 10px;
  color: var(--text-muted); gap: 20px; flex-shrink: 0;
}

/* Accordion for feedback */
.feedback-item {
  background: var(--bg-card); border-radius: 8px; padding: 12px; margin-bottom: 8px;
  border: 1px solid var(--border); cursor: pointer; transition: all 0.15s;
}
.feedback-item:hover { border-color: var(--border); background: var(--bg-hover); }
.feedback-item .fb-header { display: flex; align-items: center; gap: 10px; }
.feedback-item .fb-title { font-size: 12px; font-weight: 600; color: var(--text-primary); flex: 1; }
.feedback-item .fb-source { font-size: 10px; color: var(--text-muted); }
.feedback-item .fb-stats { display: flex; gap: 14px; margin-top: 6px; }
.feedback-item .fb-stat { font-size: 10px; color: var(--text-muted); }
.feedback-item .fb-stat strong { color: var(--text-primary); }

/* Progress bar */
.progress-bar { height: 5px; background: var(--bg-card); border-radius: 3px; overflow: hidden; margin-top: 4px; }
.progress-bar .fill { height: 100%; border-radius: 3px; }
.fill.green { background: var(--accent-green); }
.fill.orange { background: var(--accent-orange); }
.fill.red { background: var(--accent-red); }
.fill.blue { background: var(--accent-blue); }
.fill.purple { background: var(--accent-purple); }

/* Alert list */
.alert-item {
  display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: 6px;
  background: var(--bg-card); margin-bottom: 6px; border: 1px solid var(--border);
}
.alert-item.warn { border-left: 3px solid var(--accent-orange); }
.alert-item .alert-info { flex: 1; }
.alert-item .alert-title { font-size: 12px; color: var(--text-primary); font-weight: 600; }
.alert-item .alert-desc { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

/* Dashboard specific */
.kpi-row { display: flex; gap: 10px; margin-bottom: 16px; }
.kpi-card {
  flex: 1; background: linear-gradient(135deg, var(--bg-card), var(--bg-panel));
  border-radius: 12px; padding: 16px; border: 1px solid var(--border);
}
.kpi-card .kpi-val { font-size: 28px; font-weight: 800; color: #fff; }
.kpi-card .kpi-val.small { font-size: 20px; }
.kpi-card .kpi-label { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.kpi-card .kpi-sub { font-size: 10px; margin-top: 4px; }
.kpi-card .kpi-sub.up { color: var(--accent-green); }
.kpi-card .kpi-sub.down { color: var(--accent-red); }

.dash-grid2 { display: grid; grid-template-columns: 1.5fr 1fr; gap: 16px; margin-bottom: 16px; }
.dash-grid2-swap { display: grid; grid-template-columns: 1fr 1.5fr; gap: 16px; }

.chart-bar {
  display: flex; align-items: end; gap: 4px; height: 120px; padding: 4px 0;
}
.chart-bar .bar {
  flex: 1; border-radius: 3px 3px 0 0; min-width: 6px; position: relative;
  transition: height 0.3s;
}
.bar.blue { background: var(--dc-brand); }
.bar.purple { background: var(--accent-purple); }
.bar.gold { background: var(--accent-gold); }
.bar.orange { background: var(--accent-orange); }

.compete-row { display: flex; gap: 12px; margin-bottom: 10px; align-items: center; }
.compete-bar-wrap { flex: 1; height: 8px; background: var(--bg-card); border-radius: 4px; overflow: hidden; }
.compete-bar-wrap .fill { height: 100%; border-radius: 4px; }
.compete-label { font-size: 11px; color: var(--text-secondary); width: 90px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.compete-val { font-size: 11px; font-weight: 700; color: #fff; width: 50px; text-align: right; }

.rank-num { width: 20px; height: 20px; border-radius: 50%; font-size: 10px; font-weight: 800; display: flex; align-items: center; justify-content: center; }
.rank-num.top { background: linear-gradient(135deg, var(--accent-gold), var(--accent-orange)); color: #1a1a1a; }
.rank-num.norm { background: var(--bg-card); color: var(--text-muted); }

.dash-mini {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
}
.dash-mini-card {
  background: var(--bg-card); border-radius: 8px; padding: 10px; border: 1px solid var(--border);
}
.dash-mini-card .dm-title { font-size: 10px; color: var(--text-muted); margin-bottom: 4px; }
.dash-mini-card .dm-val { font-size: 16px; font-weight: 700; color: #fff; }
.dash-mini-card .dm-val.red { color: var(--accent-red); }
.dash-mini-card .dm-sub { font-size: 9px; color: var(--text-muted); margin-top: 2px; }

.competitor-news { font-size: 11px; line-height: 1.6; }
.competitor-news .cn-item { padding: 8px 0; border-bottom: 1px solid var(--border); }
.competitor-news .cn-item:last-child { border-bottom: none; }
.competitor-news .cn-title { color: var(--text-primary); font-weight: 600; }
.competitor-news .cn-date { color: var(--text-muted); font-size: 10px; }
.competitor-news .cn-impact { color: var(--accent-orange); font-size: 10px; }
</style>
</head>

function renderTab(tabKey) {

}

// ============ Nav ============
document.querySelectorAll('.nav-item').forEach(item => {

});
